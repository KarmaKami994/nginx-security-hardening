server_tokens off;

server {
    listen 80;
    server_name _;

    # ============================================
    # SECURITY HEADERS
    # ============================================

    # Verhindert MIME-Type Sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Schützt vor Clickjacking
    add_header X-Frame-Options "DENY" always;

    # Content Security Policy - kontrolliert woher Ressourcen geladen werden dürfen
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;

    # Erzwingt HTTPS (wird relevant sobald wir SSL via NPM aktivieren)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Kontrolliert wie viel Referrer-Info weitergegeben wird
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Kontrolliert Browser-Features (Kamera, Mikrofon, etc.)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Verhindert dass die Seite in einem iframe eingebettet wird (zusätzlich zu X-Frame-Options)
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        proxy_pass http://juice-shop:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
